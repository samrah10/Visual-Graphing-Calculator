<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Graphing Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Visual Graphing Calculator</h1>
        <p>Enter a function using Python style.</p>

        <div class="examples">
            <strong>Examples:</strong>
            <p>x**2</p>
            <p>np.sin(x)</p>
            <p>x**3 - 2*x</p>
            <p>np.sqrt(np.abs(x))</p>
        </div>

        <form method="POST">
            <input type="text" name="expression" value="{{ expression }}" placeholder="Enter function">
            <button type="submit">Graph</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if graph_url %}
            <div class="graph-box but im really hungry">
                <img src="data:image/png;base64,{{ graph_url }}" alt="Graph">
            </div>
        {% endif %}
    </div>
</body>
</html>
